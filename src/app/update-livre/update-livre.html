<div class="container">
  <div>
    <h2>Modifier un Livre :</h2>
  </div>
  <form>
    <!--<div class="col-sm-2 col-md-2 col-lg-2"> 
                <label >ID Livre</label> 
                <input type="text" [(ngModel)]="currentLiver.idLivre" name="idLivre" class="form-control"> 
            </div>-->
    <!--<div hidden class="col-sm-2 col-md-2 col-lg-2"> 
                <label >ID Livre</label> 
                <input type="text" [(ngModel)]="currentLivre.idLivre" name="idLivre" class="form-control"> 
            </div>  -->
    <div class="col-sm-2 col-md-2 col-lg-2">
      <label>ID Livre</label>
      <input
        readonly
        type="text"
        [(ngModel)]="currentLivre.idLivre"
        name="idLivre"
        class="form-control"
      />
    </div>
    <div class="col-sm-4 col-md-4 col-lg-4">
      <label>Nom Livre</label>
      <input type="text" [(ngModel)]="currentLivre.nomLivre" name="nomLivre" class="form-control" />
    </div>
    <div class="col-sm-4 col-md-4 col-lg-4">
      <label>Auteur</label>
      <input type="text" [(ngModel)]="currentLivre.auteur" name="auteur" class="form-control" />
    </div>
    <div class="col-sm-2 col-md-2 col-lg-2">
      <label>Prix livre</label>
      <input
        type="number"
        [(ngModel)]="currentLivre.prixLivre"
        name="prixLivre"
        class="form-control"
      />
    </div>

    <div class="col-sm-4 col-md-4 col-lg-4">
      <label>Date de publication</label>
      <input
        type="date"
        [ngModel]="currentLivre.datedepublication | date: 'yyyy-MM-dd'"
        (ngModelChange)="currentLivre.datedepublication = $event"
        name="Datedepublication"
        class="form-control"
      />
    </div>
    <select class="form-control form-control-lg" id="idThe" name="idThe" [(ngModel)]="updatedTheId">
      @for (the of themes; track the.idThe) {
        <option [value]="the.idThe">{{ the.nomThe }}</option>
      }
    </select>
    <div class="col-sm-16 col-md-16 col-lg-16">
      <label class="mb-2">Image :</label>
      <input type="file" (change)="onImageUpload($event)" class="form-control" />
    </div>
    <div class="mt-2">
      <button type="submit" (click)="onAddImageLivre()" class="btn btn-success">
        Ajouter Image
      </button>
    </div>
    <div class="col-sm-16 col-md-16 col-lg-16">
      <img
        [src]="myImage"
        class="card-img-top img-fluid rounded-start"
        style="width: 500px; height: 300px"
      />
    </div>
    <div class="card shadow mb-4">
      <div class="card-body">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>Images</th>
            </tr>
          </thead>
          @for (img of currentLivre.images; track currentLivre.idLivre) {
            <tbody>
              <tr>
                <td>
                  <img
                    class="card-img-top img-responsive"
                    src="{{ 'data:' + img.type + ';base64,' + img.image }}"
                    style="height: 50px; width: 100px"
                  />
                </td>
                <td style="width:20%" ><a class="btn btn-danger" (click)="supprimerImage(img)">Supprimer</a></td>
              </tr>
            </tbody>
          }
        </table>
      </div>
    </div>

    <div class="mt-2">
      <button type="submit" (click)="updateLivre()" class="btn btn-success">Modifer</button>
    </div>
  </form>
</div>
